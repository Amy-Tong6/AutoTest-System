# 登录 github - 成功场景（完整流程）
# web → Playwright；app → Appium；api -> Request
name: Github-成功登录
enable: false
reuse_browser: false

# 测试数据 - 多条数据驱动
test_data:
  - username: "Amy-Tong6"
    password: "***" # 测试数据，请自行修改
    description: "正确的用户"

# 步骤
steps:
  - name: 打开登录页
    action: open
    value: https://github.com/login

  - name: 输入用户名
    action: input
    locator_type: xpath
    locator_value: //*[@id="login_field"]
    value: "{{username}}"

  - name: 输入密码
    action: input
    locator_type: xpath
    locator_value: //*[@id="password"]
    value: "{{password}}"

  - name: 点击登录
    action: click
    locator_type: xpath
    locator_value: //*[@name="commit"]

  - name: 等待登录成功
    action: wait_for_url
    value: github.com
  
  - name: 点击右上角头像
    action: click
    locator_type: xpath
    locator_value: //button[@data-login]
  
  - name: 高亮用户名
    action: update_attributes
    locator_type: xpath
    locator_value: //*[@id="global-nav-user-menu-header"]//div[@title]
    attributes:
      style: "border:2px solid red"
  
  - name: 等待 3s
    action: sleep
    time: 3

  - name: 断言元素内容与用户名相同
    action: assert
    type: text
    locator_type: xpath
    locator_value: //*[@id="global-nav-user-menu-header"]//div[@title]
    expected: "{{username}}"