# 登录 github - 失败场景（到登录截止）
name: Github-失败登录
enable: true
reuse_browser: false

# 测试数据 - 多条数据驱动
test_data:
  - username: "Amy-Tong6"
    password: "123"
    description: "用户密码错误"
  - username: "Amy"
    password: "123"
    description: "用户名不存在"

# 步骤 - 简化的流程，只到点击登录为止
steps:
  - name: 打开登录页
    action: open
    value: https://github.com/login

  - name: 输入用户名
    action: input
    locator_type: xpath
    locator_value: //*[@id="login_field"]
    value: "{{username}}"

  - name: 输入密码
    action: input
    locator_type: xpath
    locator_value: //*[@id="password"]
    value: "{{password}}"

  - name: 点击登录
    action: click
    locator_type: xpath
    locator_value: //*[@name="commit"]

  - name: 验证登录失败提示词
    action: assert
    type: text
    locator_type: xpath
    locator_value: //*[@id="js-flash-container"]//div[@class="js-flash-alert"]
    expected: "Incorrect username or password."