# 登录 github - 失败场景（到登录截止）
name: 登录-github-失败登录
enable: true
reuse_page: false

# 测试数据 - 无效用户列表（都执行相同的失败流程）
test_data:
  - user_id: test_user_02
  - user_id: test_user_03

# 步骤 - 简化的流程，只到点击登录为止
steps:
  - name: 打开登录页
    action: open
    value: https://github.com/login

  - name: 输入用户名
    action: input
    locator_type: xpath
    locator_value: //*[@id="login_field"]
    value: "{{username}}"

  - name: 输入密码
    action: input
    locator_type: xpath
    locator_value: //*[@id="password"]
    value: "{{password}}"

  - name: 点击登录
    action: click
    locator_type: xpath
    locator_value: //*[@name="commit"]

# 断言 - 验证登录失败
assertions:
  - name: 验证错误提示词
    type: text
    locator_type: xpath
    locator_value: //*[@id="js-flash-container"]//div[@class="js-flash-alert"]
    expected: "Incorrect username or password."